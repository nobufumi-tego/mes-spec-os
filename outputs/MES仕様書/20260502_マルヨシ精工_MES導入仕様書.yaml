# =====================================================================
# MES 導入仕様書 / RFP 一次稿（構造化データ）
# 案件: 株式会社マルヨシ精工（架空企業）
# 生成日: 2026-05-02
# =====================================================================
# このファイルは mes-spec-os 雛形 v0.1.5 の動作検証用サンプルです。
# 実在の企業・案件とは無関係。架空のディスクリート系自動車部品メーカー
# 想定で、ENAA 4 段階フロー（調査星取表 → 要求機能整理 → ROI → ロード
# マップ・RFP）を埋めることで雛形の構造を例示する目的で作成。
# =====================================================================

# === 案件メタ ===
案件:
  名称: 株式会社マルヨシ精工 MES 導入構想
  案件ID: MES-2026-001
  対象工場:
    タイプ: discrete
    所在: 愛知県豊田市
    規模:
      従業員数: 350
      ライン数: 3              # 粗加工 / 仕上げ加工 / 検査
      製品種類数: 約 80
      主要顧客: トヨタ系自動車部品メーカー
  期間: 2026-04 構想開始 / 2026-09 RFP 発行 / 2027-04 Phase1 稼働
  予算感: 初期 1.2 億円、保守 年 1500 万円
  担当部門: 生産管理部、情報システム部（兼任 1 名）

# === Stage 1: 調査星取表 ===
# 12 大分類について MES 対象比率の高い順に必要性を判定し、
# 必須・任意の Division は Business Category 単位で深掘り。
調査星取表:

  # --- 中核 5 分類（MES 比率 80% 以上）---
  製造:
    Division必要性: 必須
    必要性理由: コア領域。ライン進捗・実績収集・段取替えすべて MES 化対象
    Business_Categories:
      製造準備:
        該当業務あり: ○
        現業務媒体: 紙の作業指示書
        現状業務: ライン長が紙で指示、製造担当が確認
        課題:
          - 指示変更が伝わらない事故が月 1〜2 件
          - 受領確認の証跡なし
      前段取り・セッティング:
        該当業務あり: ○
        現業務媒体: 段取り手順書（紙）+ 熟練工の経験
        現状業務: 段取り手順書を見ながら手作業で実施
        課題:
          - 段取替え時間が熟練度で 30〜90 分のバラツキ
          - 治工具準備の遅れによる稼働ロスが月 20 時間程度
          - 段取り標準時間の実績取得ができていない
      製造実行:
        該当業務あり: ○
        現業務媒体: 紙の製造記録票
        現状業務: 担当者が完了時に製造記録票へ手書き
        課題:
          - リアルタイム可視化不可
          - 紙の集計に月 3 日工数
          - 不良発生時の即時対応が遅い
      製造完了品対応:
        該当業務あり: ○
        現業務媒体: 紙の出来高報告 + 翌日 ERP 転記
        現状業務: 日次で集計し ERP に転記
        課題:
          - 翌日まで実績が見えない
          - 転記ミスが月数件
      工程間搬送:
        該当業務あり: ○
        現業務媒体: なし（中間在庫の現物管理のみ）
        現状業務: 工程間ストックヤードで現物管理
        課題:
          - 中間在庫の所在不明が散発
          - 仕掛品在庫の正確な把握ができない
      工程進捗管理:
        該当業務あり: ○
        現業務媒体: 朝会・ホワイトボード
        現状業務: 朝会で進捗を口頭共有
        課題:
          - リアルタイム性ゼロ
          - ライン横断の進捗が見えない

  品質管理:
    Division必要性: 必須
    必要性理由: トヨタ系の品質要求 + IATF 16949 準拠
    Business_Categories:
      検査基準策定:
        該当業務あり: ○
        現業務媒体: 紙の検査基準書
        現状業務: 品質保証部が紙で作成・管理
        課題:
          - 改訂版の現場展開にタイムラグ
          - 過去版の参照性が低い
      検査:
        該当業務あり: ○
        現業務媒体: 紙の検査記録票
        現状業務: 検査担当が紙に記録
        課題:
          - 検査結果の集計・分析に時間
          - トレーサビリティが弱い（紙→ロット紐付け手作業）
          - SPC（統計的工程管理）が事実上できていない
      不適合・不具合管理:
        該当業務あり: ○
        現業務媒体: Excel + メール
        課題:
          - 同種不具合の繰り返しに気づけない
          - 是正処置の追跡が不十分
      品質分析:
        該当業務あり: ○
        現業務媒体: Excel（月次集計）
        課題:
          - リアルタイム性ゼロ
          - 多変量分析等は手作業の限界
      品質傾向管理:
        該当業務あり: ×
        備考: 現状実施できていない。MES 化でできるようになりたい

  物流・在庫管理:
    Division必要性: 任意
    必要性理由: 部材は ERP、製品は WMS で管理中。MES では工程内在庫の可視化のみ
    Business_Categories:
      在庫管理（部材）:
        該当業務あり: ○
        現業務媒体: ERP
        備考: ERP 継続、MES では持たない
      工程内在庫管理:
        該当業務あり: ○
        現業務媒体: なし（現物管理のみ）
        課題:
          - 払出済部材の使用実績が見えない
          - 余剰や不足の把握が困難
      在庫管理（製品・完成品）:
        該当業務あり: ○
        現業務媒体: 既存 WMS
        備考: WMS 継続、MES とは確定情報を連携のみ

  設備保全:
    Division必要性: 必須
    必要性理由: 設備停止の見える化なし、保全が後手の現状を改善したい
    Business_Categories:
      設備台帳管理:
        該当業務あり: ○
        現業務媒体: Excel
        課題:
          - 機種毎の保全履歴がバラバラ
          - 部品交換予定の集計に時間
      設備モニタリング:
        該当業務あり: ×
        備考: 現状できていない。重点導入対象
        将来要件:
          - 設備稼働率のリアルタイム把握
          - 設備停止の自動検知
          - 予兆保全（異常検知）
      保全計画・指示:
        該当業務あり: ○
        現業務媒体: Excel + ホワイトボード
        課題:
          - 計画外保全の記録漏れ
          - 計画変更が現場に伝わらない
      保全実施:
        該当業務あり: ○
        現業務媒体: 紙の保全記録票
        課題:
          - 履歴検索性が低い
          - 設備別の MTBF/MTTR 集計困難
      治工具管理:
        該当業務あり: ○
        現業務媒体: Excel
        課題:
          - 寿命到達直前の検知が遅い
          - 工具紛失が月数件

  品質保証:
    Division必要性: 必須
    必要性理由: 顧客（トヨタ系）の品質要求 + トレーサビリティ義務化対応
    Business_Categories:
      出荷判定:
        該当業務あり: ○
        現業務媒体: 紙の出荷判定票 + 検査記録票
        課題:
          - 出荷判定の電子化が顧客から要求されている
          - 判定根拠の証跡が紙のみ、紛失リスクあり
      市場品質管理:
        該当業務あり: ○
        現業務媒体: Excel
        課題:
          - クレーム発生時の社内ロット特定に半日
      トレーサビリティ:
        該当業務あり: ×
        備考: 現状ロット単位の前後追跡が不完全。重点導入対象
        将来要件:
          - シリアル単位 / ロット単位の双方向トレース
          - 顧客への提出資料の自動生成

  # --- 中間 2 分類 ---
  生産管理:
    Division必要性: 任意
    必要性理由: 計画系は ERP 継続。進捗管理だけ MES 側で扱う
    Business_Categories:
      生産計画立案:
        該当業務あり: ○
        現業務媒体: ERP（SAP）
        備考: ERP 継続、MES では立案しない
      製造指図発行:
        該当業務あり: ○
        現業務媒体: ERP + 紙の指図書
        課題:
          - 指図差替えにタイムラグ
          - 過去指図の検索性が低い
      生産進捗管理:
        該当業務あり: ○
        現業務媒体: ホワイトボード + 朝会
        課題:
          - リアルタイム性ゼロ
          - ライン横断の進捗状況が見えない
      マスタ管理:
        該当業務あり: ○
        現業務媒体: ERP（部品マスタ）
        備考: ERP マスタを MES へ日次同期する想定

  従業員:
    Division必要性: 不要
    必要性理由: 人事システム + 勤怠システムで対応中、MES では持たない

  # --- 周辺 5 分類 ---
  HSE:
    Division必要性: 不要
    必要性理由: 安全衛生委員会の別運用、MES 連携は将来検討

  生産技術:
    Division必要性: 不要
    必要性理由: 設備設計・治工具設計は外注、MES では持たない

  設計:
    Division必要性: 不要
    必要性理由: 製品設計は顧客から提供、自社では設計しない

  購買・資材:
    Division必要性: 不要
    必要性理由: 既存 ERP で完結

  工場経理:
    Division必要性: 不要
    必要性理由: 既存 ERP の管理会計機能で対応

# === Stage 2: 要求機能一覧 ===
# Stage 1 の課題を起点に To-Be 施策を機能化、優先度・実現時期を付与
要求機能一覧:
  - 機能ID: F-001
    機能名: 製造実績のリアルタイム可視化
    分類: 製造 > 製造完了品対応 > 製造実績報告
    現状(As-Is): 紙の製造記録票 → 翌日 ERP 転記、リアルタイム性なし
    将来像(To-Be): 端末から完了報告、即時に基幹系へ反映、ライン横断ダッシュボード
    施策: タブレット端末＋バーコードでの実績入力 + リアルタイム集計画面
    優先度: 高
    優先理由: 月次集計の 3 日工数削減 + 進捗遅延の早期検知
    紐付く課題: [紙集計の月 3 日工数, 翌日まで実績見えず, 転記ミス]
    実現時期: 2027-04（Phase 1）
    担当部門: 生産管理部

  - 機能ID: F-002
    機能名: 製造指図の電子配信
    分類: 製造 > 製造準備 > 製造指図受領・確認
    現状(As-Is): 紙の指図書を印刷して現場配布、変更時の差替えが遅い
    将来像(To-Be): 端末で受領・確認、変更時は通知、受領証跡の自動記録
    施策: タブレット端末への指図配信 + 受領確認ボタン
    優先度: 高
    優先理由: 指示変更ミス（月 1〜2 件）の撲滅
    紐付く課題: [指示変更が伝わらない, 受領確認の証跡なし]
    実現時期: 2027-04（Phase 1）
    担当部門: 生産管理部

  - 機能ID: F-003
    機能名: 段取替え時間の標準化
    分類: 製造 > 前段取り・セッティング > 段取り指示確認・完了登録
    現状(As-Is): 段取替え時間が熟練度で 30〜90 分のバラツキ、標準時間が取れていない
    将来像(To-Be): 段取手順を端末でチェックリスト化、開始/完了打刻、実績収集
    施策: 段取手順書の電子化 + 打刻機能 + 実績分析ダッシュボード
    優先度: 中
    優先理由: 月 20 時間の稼働ロス削減（推定 600 万円/月）
    紐付く課題: [段取替え時間バラツキ, 治工具準備遅れ, 標準時間未取得]
    実現時期: 2029-01（Phase 3）
    担当部門: 生産管理部、生産技術
    備考: SMED 改善の前提となる

  - 機能ID: F-004
    機能名: 検査結果の電子記録とトレース
    分類: 品質管理 > 検査
    現状(As-Is): 紙の検査記録票、ロット紐付けが手作業、トレース困難
    将来像(To-Be): 端末で検査結果記録、ロット自動紐付け、検索性確保
    施策: 検査タブレット導入 + ロット ID 連携
    優先度: 高
    優先理由: 顧客要求 + IATF 16949 準拠 + 不具合時のロット特定迅速化
    紐付く課題: [集計時間, トレーサビリティ弱い, SPC 不可]
    実現時期: 2028-01（Phase 2）
    担当部門: 品質保証部、品質管理

  - 機能ID: F-005
    機能名: 不適合品トレースとロット特定
    分類: 品質管理 > 不適合・不具合管理 / 品質保証 > トレーサビリティ
    現状(As-Is): クレーム時のロット特定に半日、双方向追跡が不完全
    将来像(To-Be): シリアル/ロット単位の双方向トレース、ボタン 1 つで該当ロット特定
    施策: 部材入荷〜製品出荷までの ID トレース + クエリ画面
    優先度: 高
    優先理由: クレーム対応時間の短縮、回収範囲の正確な特定
    紐付く課題: [社内ロット特定半日, 双方向トレース不完全]
    実現時期: 2028-01（Phase 2）
    担当部門: 品質保証部
    備考: F-004 と一体実装

  - 機能ID: F-006
    機能名: 設備稼働状況のリアルタイム監視
    分類: 設備保全 > 設備モニタリング > 設備稼働監視
    現状(As-Is): 設備停止の見える化なし、保全担当が現場巡回で発見
    将来像(To-Be): IoT 化、設備稼働率 / 停止理由をリアルタイム可視化
    施策: 設備への信号機・センサー設置 + データ収集 + 監視画面
    優先度: 中
    優先理由: 設備停止損失の削減（推定 2000 万円/年）
    紐付く課題: [設備停止見える化なし, MTBF/MTTR 取れない]
    実現時期: 2029-01（Phase 3）
    担当部門: 設備保全課、情報システム
    備考: 既存設備の改造費用を別途見積要

  - 機能ID: F-007
    機能名: 予防保全計画の自動化
    分類: 設備保全 > 保全計画・指示 > 保全計画作成
    現状(As-Is): Excel の保全計画、稼働実績との連動なし
    将来像(To-Be): 稼働時間 / 故障履歴に基づく予防保全計画の自動生成
    施策: 設備稼働データ連携 + 計画自動生成エンジン
    優先度: 中
    優先理由: 保全工数の最適化、突発故障の削減
    紐付く課題: [計画外保全の記録漏れ, 突発故障多発]
    実現時期: 2029-01（Phase 3）
    担当部門: 設備保全課
    備考: F-006 のデータが前提

  - 機能ID: F-008
    機能名: 工程進捗のラインボード表示
    分類: 製造 > 工程進捗管理 / 生産管理 > 生産進捗管理
    現状(As-Is): 朝会・ホワイトボード、リアルタイム性ゼロ
    将来像(To-Be): 大型ディスプレイで全ラインの進捗をリアルタイム表示
    施策: F-001 のデータをラインボード化
    優先度: 高
    優先理由: ライン長の状況把握スピードアップ、遅延検知の即時化
    紐付く課題: [朝会のみで日中見えず, ライン横断把握不可]
    実現時期: 2027-04（Phase 1）
    担当部門: 生産管理部
    備考: F-001 と一体実装、追加コスト最小

  - 機能ID: F-009
    機能名: 品質傾向分析（自動）
    分類: 品質管理 > 品質傾向管理
    現状(As-Is): 月次 Excel 分析のみ、リアルタイムなし、多変量分析不可
    将来像(To-Be): SPC 自動計算 + 異常傾向の自動アラート
    施策: F-004 のデータを SPC エンジンで自動分析
    優先度: 中
    優先理由: 不良発生の予兆検知、不良率削減
    紐付く課題: [リアルタイム品質傾向見えず, SPC 不可]
    実現時期: 2028-01（Phase 2）
    担当部門: 品質保証部
    備考: F-004 のデータが前提

  - 機能ID: F-010
    機能名: 出荷判定の電子化
    分類: 品質保証 > 出荷判定 > 出荷判定
    現状(As-Is): 紙の出荷判定票、判定根拠の証跡が紙のみ
    将来像(To-Be): 検査結果を見て電子的に判定、判定証跡を自動保管、顧客提出資料の自動生成
    施策: 検査データ（F-004）連携 + 判定ワークフロー + 帳票自動生成
    優先度: 高
    優先理由: 顧客要求対応 + 監査対応の負担軽減
    紐付く課題: [紙のみで紛失リスク, 顧客から電子化要求]
    実現時期: 2028-01（Phase 2）
    担当部門: 品質保証部

# === Stage 3: 期待効果と ROI ===
# ENAA Quick Start p14 の 3 効果軸で構造化
期待効果:

  生産性品質向上:                    # 定量化しやすい
    - 指標: 月次実績集計工数
      現状値: 3 人日/月
      目標値: 0.5 人日/月
      金額換算: 60 万円/年（人件費換算）
      根拠: F-001 によるリアルタイム集計化
      関連機能: [F-001]
    - 指標: 段取替え時間
      現状値: 平均 60 分（30〜90 分のバラツキ）
      目標値: 平均 35 分
      金額換算: 7200 万円/年（稼働ロス回避、月 600 万円 × 12）
      根拠: F-003 による標準化
      関連機能: [F-003]
    - 指標: 不良率
      現状値: 0.30%
      目標値: 0.15%
      金額換算: 1500 万円/年（不良コスト削減）
      根拠: F-009 による傾向検知 + F-004 によるトレース
      関連機能: [F-004, F-009]

  新能力獲得:                        # 定量化しやすい
    - 内容: 設備稼働率のリアルタイム把握
      関連機能: [F-006]
      金額換算: 機会損失回避 2400 万円/年
      根拠: 現状把握できない停止を発見・削減
    - 内容: 予防保全による突発故障削減
      関連機能: [F-007]
      金額換算: 突発修理費 800 万円/年削減
      根拠: 設備稼働データ連携で予兆検知
    - 内容: シリアル・ロット双方向トレース
      関連機能: [F-005]
      金額換算: クレーム対応工数 50% 削減
      根拠: 半日 → 30 分への短縮

  判断の質向上:                      # 定量化しにくいが重要（ENAA カーナビメタファー）
    - 内容: ライン横断のリアルタイム進捗把握による即時意思決定
      質的効果: ライン長 / 課長が「次何をすべきか」を毎時決定できる
      推定影響: 進捗遅延の早期検知 → リカバリ着手が平均 4 時間早まる
      関連機能: [F-001, F-008]
      ENAA メタファー: 「カーナビで現在地・残距離・渋滞情報を見て迂回判断する」のと同様
    - 内容: 検査データに基づく品質判断
      質的効果: SPC アラートで「不良が出る前に」工程調整できる
      推定影響: 客先クレーム件数 30% 削減見込み
      関連機能: [F-004, F-009]
    - 内容: 設備状態に基づく保全判断
      質的効果: 「故障してから直す」から「兆候で対処する」へ
      推定影響: 計画外保全工数 50% 削減見込み
      関連機能: [F-006, F-007]

ROI概算:
  投資見積:
    初期投資: 1.2 億円（ライセンス・実装・端末・設備改造込み、Phase1〜3 合計）
    年間保守: 1500 万円
    内訳:
      Phase1 (2027): 5500 万円  # 製造実績可視化・指図電子化・ラインボード
      Phase2 (2028): 4000 万円  # 品質トレース・出荷判定電子化
      Phase3 (2029): 2500 万円  # 設備モニタリング・予防保全・段取最適化
  年間効果_保守的合計: 約 9000 万円/年
  ROI年数_試算: 約 1.3 年（初期投資 1.2 億円 / 年効果 9000 万円）
  リスク回避額_想定:
    - 顧客監査での重大指摘リスク回避（IATF 16949 準拠）: 数千万円相当
    - リコール時の対象ロット特定遅延コスト回避: 1000 万円〜数億円相当
  備考: 投資総額が出ない場合の逆算 → ROI 2 年許容なら投資上限 1.8 億円

# === Stage 4: ロードマップ・RFP情報 ===
ロードマップ:
  - Phase: 1
    時期: 2027-04 〜 2027-12
    範囲: [F-001, F-002, F-008]
    範囲ラベル: 製造実績可視化フェーズ
    狙い: 紙ベースを脱却、リアルタイム可視化を最優先で実現
    主要マイルストーン:
      - 2027-04: 開発着手
      - 2027-09: ラインA 試行運用
      - 2027-12: 全 3 ライン稼働
  - Phase: 2
    時期: 2028-01 〜 2028-12
    範囲: [F-004, F-005, F-009, F-010]
    範囲ラベル: 品質トレースフェーズ
    狙い: トヨタ系の品質要求 + IATF 16949 準拠を完成
    主要マイルストーン:
      - 2028-04: 検査タブレット導入
      - 2028-09: トレーサビリティ機能稼働
      - 2028-12: SPC・出荷判定電子化完成
  - Phase: 3
    時期: 2029-01 〜 2029-12
    範囲: [F-003, F-006, F-007]
    範囲ラベル: 設備保全・段取最適化フェーズ
    狙い: 設備データ駆動型の運用へ移行
    主要マイルストーン:
      - 2029-04: 設備モニタリング着手（IoT 改造含む）
      - 2029-09: 予防保全計画自動化
      - 2029-12: 段取最適化機能完成

非機能要件:
  パフォーマンス:
    - 製造実績登録レスポンス: < 2 秒
    - 画面表示: < 3 秒
    - 同時接続端末数: 100 台以上
  可用性:
    - 稼働時間目標: 99.5%（月間 3 時間以内の停止）
    - データバックアップ: 日次 + 重要データはリアルタイムレプリケーション
    - 障害時 RPO: 4 時間 / RTO: 8 時間
  セキュリティ:
    - 標準準拠: ISMS / IATF 16949 / トヨタ系セキュリティ要件
    - 外部ネットワーク隔離: 工場 NW は基幹系から論理分離、インターネット直接接続なし
    - 認証: 端末ログイン + 工程毎の権限制御
    - ログ監査: 全操作ログ 1 年保管
  既存基幹系連携:
    - ERP（SAP）: 部品マスタ・指図・出来高（双方向）
    - WMS: 製品在庫（製品確定情報の連携）
    - CAD/PLM: 図面・作業手順書（参照のみ）
    - 既存勤怠システム: 作業者情報（一方向、参照のみ）

RFP想定:
  発行時期: 2026-09
  対象パートナー候補:
    - 大手 MES ベンダー（国内 3 社想定）
    - 自動車業界実績のある SIer（2 社想定）
  選定基準:
    - 自動車業界（特にトヨタ系）導入実績
    - IATF 16949 準拠の製品・実装ノウハウ
    - 既存 ERP（SAP）との連携実績
    - Phase 制での段階的導入の柔軟性
    - 保守費用の合理性
  特記事項:
    - 設備モニタリング部分（F-006）は別契約とする可能性あり（IoT 専業との分離発注）

制約・前提:
  前提:
    - 既存 ERP（SAP）は継続使用、MES とは双方向連携
    - 工場 NW のセキュリティ境界は変更しない
    - Phase 制で段階的に拡張、各 Phase 完了時点で稼働可能とする
  制約:
    - 既存設備の大規模改造は予算上 Phase 3 まで先送り
    - 工場停止を伴う切替は年末年始 / 夏期休暇のみ許容
    - 新システム導入による現場への教育コストは社内負担とする

